services:
  api:
    build: ${API_BUILD_CONTEXT}
    container_name: ${API_CONTAINER_NAME}
    ports:
      - "${API_PORT}:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
    volumes:
      - ${API_BIND_MOUNT}:/app/app
    depends_on:
      db:
        condition: service_healthy

  db:
    # Usamos PostgreSQL 16 + Extensión pgvector (Bases Vectoriales locales)
    image: pgvector/pgvector:pg16
    container_name: ${DB_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - ${DB_VOLUME_NAME}:/var/lib/postgresql/data

volumes:
  procesally_pgdata:
    name: ${DB_VOLUME_NAME}
